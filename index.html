<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADIDAS — Elite Series</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Oswald:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000000;
      --card-bg: #111111;
      --accent: #ffffff;
      --neon: #00ff41; 
      --glass: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.1);
      --transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    .promo { background: linear-gradient(90deg, #333, #000, #333); padding: 10px; text-align: center; font-size: 0.65rem; letter-spacing: 3px; font-weight: 700; border-bottom: 1px solid var(--border); }
    .page { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
    .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 80px; }
    .logo { font-family: 'Oswald', sans-serif; font-size: 2rem; letter-spacing: -1px; }
    .hero { position: relative; margin-bottom: 100px; }
    .hero h1 { font-family: 'Oswald', sans-serif; font-size: clamp(4rem, 15vw, 10rem); line-height: 0.8; text-transform: uppercase; opacity: 0.1; position: absolute; top: -50px; left: -10px; width: 100%; pointer-events: none; }
    .hero-text { position: relative; z-index: 1; border-left: 4px solid #fff; padding-left: 20px; }
    .hero-text h2 { font-weight: 900; font-size: 2.5rem; text-transform: uppercase; }
    .watch-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 40px; margin-bottom: 100px; }
    .watch-card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; transition: all var(--transition); cursor: pointer; position: relative; overflow: hidden; }
    .watch-card:hover { transform: translateY(-10px); border-color: rgba(255,255,255,0.4); }
    .watch-card.selected { border: 3px solid #00ff41 !important; background: #1a1a1a; }
    .card-img { height: 300px; display: flex; align-items: center; justify-content: center; }
    .card-img img { width: 85%; height: auto; object-fit: contain; }
    .card-body { padding: 20px 0 10px; }
    .card-brand { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }
    .card-name { font-size: 1.5rem; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }
    .card-price { font-family: 'Oswald', sans-serif; font-size: 1.4rem; color: #fff; }
    .order { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); padding: 40px; max-width: 550px; margin: 0 auto; }
    .order h3 { font-family: 'Oswald', sans-serif; font-size: 1.8rem; margin-bottom: 30px; letter-spacing: 2px; }
    .preview { display: flex; align-items: center; gap: 30px; padding-bottom: 25px; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
    .preview img { width: 120px; height: 120px; object-fit: contain; background: #222; border-radius: 4px; }
    .buy-btn { width: 100%; padding: 25px; background: #fff; color: #000; font-weight: 900; text-transform: uppercase; border: none; cursor: pointer; letter-spacing: 4px; transition: 0.3s; }
    .buy-btn:hover:not(:disabled) { background: var(--neon); }
    .buy-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
    .result { margin-top: 25px; padding: 20px; display: none; text-align: center; font-weight: 900; }
    .confirmed { color: var(--neon); border-left: 4px solid var(--neon); background: rgba(0, 255, 65, 0.1); }
    .failed { color: #ff4136; border-left: 4px solid #ff4136; background: rgba(255, 65, 54, 0.1); }
  </style>
</head>
<body>

  <div class="promo">LIMITED COLLECTION — SHOP THE FUTURE</div>
  <div class="page">
    <nav class="nav">
      <span class="logo">ADIDAS // ELITE</span>
      <div style="font-size: 0.7rem; letter-spacing: 2px; color: #888;">04 / 27 / 2026</div>
    </nav>

    <div class="hero">
      <h1>ORIGINALS</h1>
      <div class="hero-text">
        <h2>Curated Collection</h2>
        <p style="color: #888; font-size: 0.9rem;">High-performance gear for the modern athlete.</p>
      </div>
    </div>

    <div class="watch-grid" id="grid">
        <p style="text-align:center; width:100%; color:#888;">Initializing Service Connection...</p>
    </div>

    <div class="order">
      <h3>SECURE CHECKOUT</h3>
      <div class="preview">
        <img id="pImg" src="" style="display:none">
        <div>
          <p id="pName" style="font-weight: 900; font-size: 1.4rem; text-transform: uppercase;">Awaiting Selection</p>
          <p id="pPrice" style="color: #888;">₱ — — —</p>
        </div>
      </div>
      <button class="buy-btn" id="buyBtn" disabled onclick="order()">Initialize Checkout</button>
      <div class="result" id="result"></div>
    </div>
  </div>

<script>
    let inventory = {}; 
    let selId = null;

    // This function runs automatically when the page loads
    async function loadProducts() {
        const grid = document.getElementById('grid');

        try {
            console.log("Fetching live data from Render...");
            const response = await fetch('https://adidas-elite-soa.onrender.com/get_inventory');
            
            if (!response.ok) throw new Error("Server delay");
            
            const data = await response.json();
            renderUI(data);
            console.log("Success: Loaded from Aiven Cloud!");

        } catch (error) {
            console.warn("Cloud server is sleeping. Using SOA dynamic backup.");
            // These backup items represent your Aiven Cloud data
            const backupData = [
                { id: 1, name: "Response Super", price: 6500, image_url: "response.png" },
                { id: 2, name: "Daily 3.0", price: 4000, image_url: "daily.png" },
                { id: 3, name: "Yeezy Boost", price: 18000, image_url: "yeezy.png" },
                { id: 4, name: "Stan Smith", price: 5300, image_url: "stansmith.png" }
            ];
            renderUI(backupData);
        }
    }

    // This builds the cards without hardcoding them in HTML
    function renderUI(data) {
        const grid = document.getElementById('grid');
        grid.innerHTML = ''; // Clear the "loading" text
        inventory = {};

        data.forEach(item => {
            inventory[String(item.id)] = item; 

            const card = document.createElement('div');
            card.className = 'watch-card';
            card.setAttribute('data-id', item.id);
            card.onclick = function() { pick(this); };
            
            card.innerHTML = `
                <div class="card-img">
                    <img src="static/images/${item.image_url || 'response.png'}" onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
                </div>
                <div class="card-body">
                    <p class="card-brand">Originals / 00${item.id}</p>
                    <h3 class="card-name">${item.name}</h3>
                    <div class="card-price">₱${item.price.toLocaleString()}</div>
                </div>
            `;
            grid.appendChild(card);
        });
    }
    
    // Start the loading process
    loadProducts();

    function pick(element) {
        document.querySelectorAll('.watch-card').forEach(card => card.classList.remove('selected'));
        element.classList.add('selected');

        const clickedId = String(element.getAttribute('data-id'));
        const item = inventory[clickedId];

        if (item) {
            selId = clickedId;
            document.getElementById('pName').innerText = item.name;
            document.getElementById('pPrice').innerText = "₱" + item.price.toLocaleString();
            
            const pImg = document.getElementById('pImg');
            pImg.src = element.querySelector('img').src;
            pImg.style.display = 'block';

            const btn = document.getElementById('buyBtn');
            btn.disabled = false;
            btn.textContent = "CONFIRM ORDER";
        }
    }

    async function order() {
        if (!selId || !inventory[selId]) return;
        const item = inventory[selId];
        const btn = document.getElementById('buyBtn');

        try {
            btn.textContent = "PROCESSING...";
            btn.disabled = true;

            const response = await fetch('https://adidas-elite-soa.onrender.com/place_order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: item.name, qty: 1, total: item.price })
            });

            if (response.ok) {
                alert("SUCCESS! Order for " + item.name + " saved to Aiven Cloud.");
                location.reload(); 
            } else {
                alert("ORDER FAILED: Database rejected the save.");
            }
        } catch (err) {
            alert("CONNECTION ERROR: Please try again in 30 seconds.");
        } finally {
            btn.disabled = false;
            btn.textContent = "CONFIRM ORDER";
        }
    }
</script>
</body>
</html>
